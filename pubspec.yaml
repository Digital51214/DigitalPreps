name: digital_preps
description: "A new Flutter project."

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  flutter_svg: ^2.2.4
  get: ^4.7.3
  table_calendar: ^3.2.0
  image_picker: ^1.2.1
  permission_handler: ^12.0.1



dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/


# ✅ Correct place for app icons config
flutter_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.png"
